name: palavra_viva
description: "App Bíblia Parnassá - Orquestrador gamificado de estudos bíblicos"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  firebase_remote_config: ^5.0.0
  cloud_functions: ^5.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Animations
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  flame: ^1.17.0

  # UI
  google_fonts: ^6.2.0
  fl_chart: ^0.68.0
  flutter_markdown: ^0.7.7+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # Audio
  audioplayers: ^6.1.0
  flutter_tts: ^4.0.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  path_provider: ^2.1.0
  http: ^1.2.2
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/lottie/
    - assets/images/generated/
